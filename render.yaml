services:
  - type: web
    name: email-scam-detector
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn email_scam_detector.wsgi:application --bind 0.0.0.0:$PORT
    disk: 1024
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromSecret: DATABASE_URL
